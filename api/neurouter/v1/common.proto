syntax = "proto3";

package neurouter.v1;

option go_package = "github.com/neuraxes/neurouter/api/neurouter/v1;v1";

enum ReasoningEffort {
  REASONING_EFFORT_UNSPECIFIED = 0;
  REASONING_EFFORT_NONE = 1;
  REASONING_EFFORT_MINIMAL = 2;
  REASONING_EFFORT_LOW = 3;
  REASONING_EFFORT_MEDIUM = 4;
  REASONING_EFFORT_HIGH = 5;
  REASONING_EFFORT_MAX = 6;
}

message ReasoningConfig {
  // The effort level for reasoning.
  ReasoningEffort effort = 1;
  // The token budget for reasoning.
  uint32 token_budget = 2;
}

message GenerationConfig {
  // The maximum number of tokens that can be generated.
  optional int64 max_tokens = 1;
  // The temperature sampling. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic.
  optional float temperature = 2;
  // The nucleus sampling, where the model considers the results of the tokens with top_p probability mass.
  optional float top_p = 3;
  // The top_k sampling, where the model considers the results of the top_k most probable tokens.
  optional int64 top_k = 4;
  // Positive values penalize new tokens based on their existing frequency in the text so far, decreasing the model's likelihood to repeat the same line verbatim.
  optional float frequency_penalty = 5;
  // Positive values penalize new tokens based on whether they appear in the text so far, increasing the model's likelihood to talk about new topics.
  optional float presence_penalty = 6;
  // Configuration for reasoning.
  optional ReasoningConfig reasoning_config = 7;

  oneof template {
    string preset_template = 50;
  }

  oneof grammar {
    // Preset grammars, e.g. "text", "json_object", etc.
    string preset_grammar = 60;
    // The GGML BNF grammar definition.
    string gbnf_grammar = 61;
    // The schema definition.
    Schema schema = 62;
    // The JSON schema definition.
    string json_schema = 63;
  }
}

message Statistics {
  message Usage {
    uint32 input_tokens = 1;
    uint32 output_tokens = 2;
    uint32 cached_input_tokens = 3;
    uint32 reasoning_tokens = 4;
  }

  Usage usage = 1;
}

// Modality defines the types of input/output the model can handle.
enum Modality {
  MODALITY_UNSPECIFIED = 0;
  MODALITY_TEXT = 1;
  MODALITY_IMAGE = 2;
  MODALITY_AUDIO = 3;
  MODALITY_VIDEO = 4;
}

// Capability defines what the model can do.
enum Capability {
  CAPABILITY_UNSPECIFIED = 0;
  CAPABILITY_CHAT = 1;
  CAPABILITY_COMPLETION = 2;
  CAPABILITY_EMBEDDING = 3;
  CAPABILITY_TOOL_USE = 4;
}

message Schema {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_STRING = 1;
    TYPE_NUMBER = 2;
    TYPE_INTEGER = 3;
    TYPE_BOOLEAN = 4;
    TYPE_ARRAY = 5;
    TYPE_OBJECT = 6;
  }

  Type type = 1;
  string description = 2;

  // The minimum for number
  double minimum = 3;
  // The maximum for number
  double maximum = 4;

  // The regex pattern for string
  string pattern = 5;
  // The minimum length for string
  int32 minLength = 6;
  // The maximum length for string
  int32 maxLength = 7;

  // The schema for array items
  Schema items = 8;
  // The minimum number of items for array
  int32 minItems = 9;
  // The maximum number of items for array
  int32 maxItems = 10;

  // The schema for object keys
  Schema propertyNames = 11;
  // The schema for object values
  map<string, Schema> properties = 12;
  // The required properties for object
  repeated string required = 13;

  repeated string enum = 14;
}

message Tool {
  message Function {
    string name = 1;
    string description = 2;
    Schema parameters = 3;
  }

  oneof tool {
    Function function = 1;
  }
}
