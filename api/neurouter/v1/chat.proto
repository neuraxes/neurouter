syntax = "proto3";

package neurouter.v1;

import "google/api/annotations.proto";
import "neurouter/v1/common.proto";
import "neurouter/v1/content.proto";

option go_package = "github.com/neuraxes/neurouter/api/neurouter/v1;v1";

service Chat {
  rpc Chat(ChatReq) returns (ChatResp) {
    option (google.api.http) = {
      post: "/v1/chat"
      body: "*"
    };
  }
  rpc ChatStream(ChatReq) returns (stream ChatEvent) {}
}

enum Role {
  SYSTEM = 0;
  USER = 1;
  MODEL = 2;
}

enum ChatStatus {
  // The model is generating the response
  CHAT_IN_PROGRESS = 0;
  // The model turn has been successfully completed
  CHAT_COMPLETED = 1;
  // The generation failed due to an error
  CHAT_FAILED = 2;
  // The generation has been refused
  CHAT_REFUSED = 3;
  // The generation has been cancelled
  CHAT_CANCELLED = 4;
  // The generation stopped due to pending tool uses
  CHAT_PENDING_TOOL_USE = 5;
  // The generation stopped due to exceeding token limit
  CHAT_REACHED_TOKEN_LIMIT = 6;
}

message Message {
  // The unique identifier of the message
  string id = 1;
  // The role of the message sender
  Role role = 2;
  // The multi-modality content
  repeated Content contents = 3;
  // The optional name of the message sender
  string name = 4;
}

message ChatReq {
  // The unique identifier of the chat session
  string id = 1;
  // The requested model to use
  string model = 2;
  // The generation configuration
  GenerationConfig config = 3;
  // The conversation history
  repeated Message messages = 4;
  // The tools available for the model to use
  repeated Tool tools = 5;
  // Additional metadata for the request
  map<string, string> metadata = 15;
}

message ChatResp {
  // The unique identifier of the chat session
  string id = 1;
  // The model used to generate the response
  string model = 2;
  // The final status of the chat turn
  ChatStatus status = 3;
  // The generated message
  Message message = 4;
  // The statistics for the generation
  Statistics statistics = 5;
}

message ChatEvent {
  // The unique identifier of the chat session
  string id = 1;
  // The latest cumulative usage snapshot. A single event rarely carries every
  // field, so reducers must overwrite only the non-zero fields and treat
  // absent fields as unchanged.
  Usage usage = 2;

  oneof event {
    // Opens a model turn and carries the message-level identity.
    MessageStart message_start = 50;
    // Terminates a model turn and carries the final status.
    MessageStop message_stop = 51;

    // Opens a content block for streamable content. ContentStart events are
    // emitted in content index order; a later index never starts before an
    // earlier index.
    ContentStart content_start = 61;
    // Carries an incremental update to the open content block at the given index.
    // After multiple content blocks are open, their deltas may interleave until
    // each block is stopped.
    ContentDelta content_delta = 62;
    // Closes the content block at the given index.
    ContentStop content_stop = 63;
    // Carries the full snapshot of a content, normally for non-streamable content.
    Content content_snapshot = 64;
  }
}

message MessageStart {
  // The unique identifier of the message
  string id = 1;
  // The model used to generate the message
  string model = 2;
}

message MessageStop {
  // The final status of the turn.
  ChatStatus status = 1;
}

message TextStart {}

message ToolUseStart {
  string id = 1;
  string name = 2;
}

message ContentStart {
  // The unique identifier of the content
  string id = 1;
  // The index of the content within the message.
  uint32 index = 2;
  // The semantic phase of the content
  ContentPhase phase = 3;
  // Additional metadata for the content
  map<string, string> metadata = 9;
  oneof content {
    TextStart text = 10;
    ToolUseStart tool_use = 11;
  }
}

message ContentDelta {
  // The index of the content within the message.
  uint32 index = 1;

  oneof delta {
    // A fragment of text or reasoning content.
    string text = 10;
    // A fragment of the provider-supplied verification signature.
    string signature = 11;
    // A fragment of the tool-use input.
    string tool_input_text = 12;
  }
}

// Closes the content block at the given index.
message ContentStop {
  // The index of the content within the message.
  uint32 index = 1;
}
